[build]
  command = "npm run build"
  publish = "dist"

[functions]
  directory = "netlify/functions"

[secrets.scan]
  omit_keys = [
    "VITE_SUPABASE_URL",
    "VITE_SUPABASE_ANON_KEY",
    "VITE_TELEGRAM_BOT_TOKEN",
    "VITE_TELEGRAM_CHAT_IDS",
    "TELEGRAM_BOT_TOKEN",
    "TELEGRAM_CHAT_IDS"
  ]
